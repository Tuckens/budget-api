services:
  db:
    image: postgres:16-alpine
    container_name: budget_postgres
    environment:
      POSTGRES_DB: budgetdb
      POSTGRES_USER: budgetuser
      POSTGRES_PASSWORD: budgetpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgetuser -d budgetdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: budget_app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/budgetdb
      SPRING_DATASOURCE_USERNAME: budgetuser
      SPRING_DATASOURCE_PASSWORD: budgetpass
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: